{{ $link := .Get "link" }}
{{ $title := .Get "title" }}
{{ $icon := .Get "icon" }}
{{ $description := .Get "description" }}

<div class="relative group w-full sm:w-[calc(50%-8px)] lg:w-[calc(33.333%-11px)]">
    <div
        class="h-full bg-neutral-100 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 hover:border-primary-400 dark:hover:border-primary-500 dark:hover:bg-neutral-700 rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 p-6 flex flex-col items-center text-center">
        {{ if $icon }}
        <div class="mb-4 text-primary-500 dark:text-primary-400">
            <i class="fas fa-{{ $icon }} fa-2x"></i>
        </div>
        {{ end }}
        <h5 class="text-lg font-bold mb-2">
            <a href="{{ $link | absURL }}"
                class="after:absolute after:inset-0 after:content-[''] text-inherit no-underline hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                {{ $title }}
            </a>
        </h5>
        {{ if $description }}
        <p class="text-sm text-neutral-600 dark:text-neutral-400 mt-1 leading-relaxed">{{ $description }}</p>
        {{ end }}
    </div>
</div>
