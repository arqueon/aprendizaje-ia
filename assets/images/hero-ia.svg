<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="40%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="55%" r="38%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="20%" cy="65%" r="30%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow1)"/>
  <rect width="1200" height="600" fill="url(#glow2)"/>
  <rect width="1200" height="600" fill="url(#glow3)"/>

  <!-- Subtle grid -->
  <g stroke="#818cf8" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>

  <!-- Neural network connections — organic brain-like layout -->
  <g stroke="#818cf8" stroke-opacity="0.30" stroke-width="1.2" fill="none">
    <!-- Input layer (left) -->
    <line x1="120" y1="150" x2="310" y2="200"/>
    <line x1="120" y1="300" x2="310" y2="200"/>
    <line x1="120" y1="300" x2="310" y2="370"/>
    <line x1="120" y1="450" x2="310" y2="370"/>
    <line x1="120" y1="150" x2="310" y2="370"/>
    <!-- Hidden layer 1 -->
    <line x1="310" y1="200" x2="520" y2="140"/>
    <line x1="310" y1="200" x2="520" y2="280"/>
    <line x1="310" y1="370" x2="520" y2="280"/>
    <line x1="310" y1="370" x2="520" y2="430"/>
    <line x1="310" y1="200" x2="520" y2="430"/>
    <!-- Hidden layer 2 (central hub) -->
    <line x1="520" y1="140" x2="700" y2="180"/>
    <line x1="520" y1="280" x2="700" y2="180"/>
    <line x1="520" y1="280" x2="700" y2="320"/>
    <line x1="520" y1="430" x2="700" y2="320"/>
    <line x1="520" y1="140" x2="700" y2="320"/>
    <line x1="520" y1="430" x2="700" y2="470"/>
    <line x1="520" y1="280" x2="700" y2="470"/>
    <!-- Hidden layer 3 -->
    <line x1="700" y1="180" x2="890" y2="220"/>
    <line x1="700" y1="320" x2="890" y2="220"/>
    <line x1="700" y1="320" x2="890" y2="380"/>
    <line x1="700" y1="470" x2="890" y2="380"/>
    <line x1="700" y1="180" x2="890" y2="380"/>
    <!-- Output layer (right) -->
    <line x1="890" y1="220" x2="1080" y2="180"/>
    <line x1="890" y1="220" x2="1080" y2="300"/>
    <line x1="890" y1="380" x2="1080" y2="300"/>
    <line x1="890" y1="380" x2="1080" y2="420"/>
    <line x1="890" y1="220" x2="1080" y2="420"/>
  </g>

  <!-- Glowing pulse rings on central nodes -->
  <circle cx="700" cy="320" r="22" fill="none" stroke="#6366f1" stroke-opacity="0.20" stroke-width="8"/>
  <circle cx="520" cy="280" r="16" fill="none" stroke="#818cf8" stroke-opacity="0.18" stroke-width="6"/>

  <!-- Hub nodes (large, glowing) -->
  <g fill="#6366f1">
    <circle cx="700" cy="320" r="12"/>
    <circle cx="520" cy="280" r="10"/>
    <circle cx="700" cy="180" r="8"/>
    <circle cx="890" cy="220" r="9"/>
  </g>

  <!-- Secondary nodes -->
  <g fill="#818cf8" fill-opacity="0.85">
    <circle cx="310" cy="200" r="7"/>
    <circle cx="310" cy="370" r="7"/>
    <circle cx="520" cy="140" r="6"/>
    <circle cx="520" cy="430" r="6"/>
    <circle cx="700" cy="470" r="6"/>
    <circle cx="890" cy="380" r="7"/>
    <circle cx="1080" cy="180" r="5"/>
    <circle cx="1080" cy="300" r="5"/>
    <circle cx="1080" cy="420" r="5"/>
  </g>

  <!-- Input nodes -->
  <g fill="#a5b4fc" fill-opacity="0.70">
    <circle cx="120" cy="150" r="5"/>
    <circle cx="120" cy="300" r="5"/>
    <circle cx="120" cy="450" r="5"/>
  </g>

  <!-- Node labels -->
  <g fill="#c7d2fe" font-family="monospace" font-size="10" fill-opacity="0.55">
    <text x="712" y="316">Aprendizaje</text>
    <text x="532" y="276">IA</text>
    <text x="712" y="176">Evaluación</text>
    <text x="902" y="216">Docencia</text>
  </g>

  <!-- Ambient floating dots -->
  <g fill="#c7d2fe" fill-opacity="0.25">
    <circle cx="60" cy="90" r="2"/>
    <circle cx="420" cy="55" r="2"/>
    <circle cx="780" cy="70" r="2"/>
    <circle cx="1130" cy="380" r="2"/>
    <circle cx="970" cy="540" r="2"/>
    <circle cx="230" cy="540" r="2"/>
    <circle cx="590" cy="530" r="3"/>
    <circle cx="1160" cy="100" r="2"/>
    <circle cx="45" cy="490" r="2"/>
    <circle cx="850" cy="555" r="2"/>
    <circle cx="1050" cy="540" r="2"/>
  </g>

  <!-- Bottom overlay for text readability -->
  <defs>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#overlay)"/>
</svg>
