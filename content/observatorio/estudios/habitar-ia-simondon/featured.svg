<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Figura humana inmersa en una red tecnológica envolvente que representa el mundoambiente digital">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0c1a3a"/>
    </linearGradient>
    <radialGradient id="atmosphere" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowFigure" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#atmosphere)"/>

  <!-- Concentric rings: mundoambiente -->
  <g fill="none" stroke="#818cf8" stroke-opacity="0.18">
    <circle cx="600" cy="340" r="120" stroke-width="1"/>
    <circle cx="600" cy="340" r="200" stroke-width="1"/>
    <circle cx="600" cy="340" r="290" stroke-width="1" stroke-dasharray="3 6"/>
    <circle cx="600" cy="340" r="390" stroke-width="1" stroke-dasharray="2 8"/>
    <circle cx="600" cy="340" r="500" stroke-width="0.8" stroke-dasharray="1 10"/>
  </g>

  <!-- Grid subtle -->
  <g stroke="#818cf8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="340" x2="1200" y2="340"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
  </g>

  <!-- Orbiting technical nodes -->
  <g>
    <!-- connecting web -->
    <g stroke="#a5b4fc" stroke-opacity="0.22" stroke-width="1" fill="none">
      <line x1="600" y1="340" x2="360" y2="180"/>
      <line x1="600" y1="340" x2="860" y2="160"/>
      <line x1="600" y1="340" x2="940" y2="360"/>
      <line x1="600" y1="340" x2="840" y2="540"/>
      <line x1="600" y1="340" x2="360" y2="540"/>
      <line x1="600" y1="340" x2="220" y2="360"/>
      <line x1="360" y1="180" x2="860" y2="160"/>
      <line x1="860" y1="160" x2="940" y2="360"/>
      <line x1="940" y1="360" x2="840" y2="540"/>
      <line x1="840" y1="540" x2="360" y2="540"/>
      <line x1="360" y1="540" x2="220" y2="360"/>
      <line x1="220" y1="360" x2="360" y2="180"/>
      <!-- outer ring -->
      <line x1="360" y1="180" x2="150" y2="120"/>
      <line x1="860" y1="160" x2="1070" y2="90"/>
      <line x1="940" y1="360" x2="1130" y2="450"/>
      <line x1="840" y1="540" x2="1040" y2="620"/>
      <line x1="360" y1="540" x2="160" y2="600"/>
      <line x1="220" y1="360" x2="60" y2="280"/>
    </g>

    <!-- nodes -->
    <g fill="#c7d2fe">
      <circle cx="360" cy="180" r="6"/>
      <circle cx="860" cy="160" r="7"/>
      <circle cx="940" cy="360" r="6"/>
      <circle cx="840" cy="540" r="5"/>
      <circle cx="360" cy="540" r="6"/>
      <circle cx="220" cy="360" r="7"/>
    </g>
    <g fill="#a5b4fc" fill-opacity="0.7">
      <circle cx="150" cy="120" r="4"/>
      <circle cx="1070" cy="90" r="4"/>
      <circle cx="1130" cy="450" r="3"/>
      <circle cx="1040" cy="620" r="4"/>
      <circle cx="160" cy="600" r="3"/>
      <circle cx="60" cy="280" r="4"/>
    </g>
  </g>

  <!-- Central human figure: silhouette reading, embedded in the network -->
  <g>
    <!-- glow behind figure -->
    <circle cx="600" cy="340" r="80" fill="url(#glowFigure)" filter="url(#soft)"/>
    <!-- Head -->
    <circle cx="600" cy="290" r="22" fill="#e0e7ff"/>
    <!-- Shoulders/torso -->
    <path d="M 548 395 Q 548 340 600 332 Q 652 340 652 395 Z" fill="#c7d2fe"/>
    <!-- A subtle book/screen they are holding -->
    <rect x="578" y="365" width="44" height="26" rx="3" fill="#312e81" stroke="#a5b4fc" stroke-opacity="0.6"/>
    <line x1="582" y1="373" x2="618" y2="373" stroke="#a5b4fc" stroke-opacity="0.5" stroke-width="1"/>
    <line x1="582" y1="380" x2="614" y2="380" stroke="#a5b4fc" stroke-opacity="0.4" stroke-width="1"/>
    <line x1="582" y1="386" x2="606" y2="386" stroke="#a5b4fc" stroke-opacity="0.3" stroke-width="1"/>
  </g>

  <!-- Title -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="80" y="90" fill="#e0e7ff" font-size="20" font-weight="600" letter-spacing="3">OBSERVATORIO · ESTUDIOS</text>
    <text x="80" y="540" fill="#ffffff" font-size="56" font-weight="800">Habitar la IA</text>
    <text x="80" y="582" fill="#a5b4fc" font-size="22" font-weight="400">De la herramienta al mundoambiente</text>
  </g>
</svg>
