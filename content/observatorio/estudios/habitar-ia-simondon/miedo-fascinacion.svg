<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Péndulo entre miedo y fascinación por la tecnología, con una tercera vía en el centro: comprender">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="520" fill="url(#bgP)"/>

  <!-- Axis/arc -->
  <path d="M 150 360 Q 600 120 1050 360" fill="none" stroke="#6366f1" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Left extreme: Miedo -->
  <g transform="translate(150,360)">
    <circle r="55" fill="#7f1d1d" opacity="0.85"/>
    <!-- a stylized warning -->
    <path d="M -22 16 L 0 -24 L 22 16 Z" fill="none" stroke="#fecaca" stroke-width="3"/>
    <line x1="0" y1="-4" x2="0" y2="8" stroke="#fecaca" stroke-width="3"/>
    <circle cx="0" cy="13" r="2" fill="#fecaca"/>
    <text y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#fca5a5">Miedo</text>
    <text y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#fecaca">«La IA reemplaza al docente»</text>
    <text y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#fecaca">«Prohibirla es cuidarlos»</text>
  </g>

  <!-- Right extreme: Fascinación -->
  <g transform="translate(1050,360)">
    <circle r="55" fill="#701a75" opacity="0.85"/>
    <!-- sparkle -->
    <g stroke="#f5d0fe" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="0" y1="-24" x2="0" y2="-8"/>
      <line x1="0" y1="8" x2="0" y2="24"/>
      <line x1="-24" y1="0" x2="-8" y2="0"/>
      <line x1="8" y1="0" x2="24" y2="0"/>
      <line x1="-16" y1="-16" x2="-6" y2="-6"/>
      <line x1="6" y1="6" x2="16" y2="16"/>
      <line x1="-16" y1="16" x2="-6" y2="6"/>
      <line x1="6" y1="-6" x2="16" y2="-16"/>
    </g>
    <text y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#f0abfc">Fascinación</text>
    <text y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f5d0fe">«La IA revoluciona el aula»</text>
    <text y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#f5d0fe">«Resolverá todos los problemas»</text>
  </g>

  <!-- Center: Comprender -->
  <g transform="translate(600,180)">
    <circle r="90" fill="url(#centerGlow)"/>
    <circle r="60" fill="#1e1b4b" stroke="#fbbf24" stroke-width="2"/>
    <!-- abstract "understand" icon: magnifier + brain ring -->
    <circle r="22" fill="none" stroke="#fde68a" stroke-width="2.5"/>
    <line x1="16" y1="16" x2="30" y2="30" stroke="#fde68a" stroke-width="3" stroke-linecap="round"/>
    <text y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#fde68a">Comprender</text>
    <text y="125" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#fef3c7">Cultura técnica crítica</text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="480" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" fill="#c7d2fe">
    Ambos extremos tratan a la tecnología como fuerza autónoma. Simondon propone una tercera vía.
  </text>
</svg>
