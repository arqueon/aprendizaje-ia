<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Diagrama de los tres niveles de los objetos técnicos según Simondon: elementos, individuos y conjuntos técnicos">
  <defs>
    <linearGradient id="bgN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bgN)"/>

  <!-- Left column: big diagram -->
  <g transform="translate(300,300)">
    <circle r="240" fill="url(#ringGlow)"/>
    <!-- Conjunto técnico (outer) -->
    <circle r="220" fill="none" stroke="#4f46e5" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="5 5"/>
    <!-- Individuo técnico (middle) -->
    <circle r="140" fill="#e0e7ff" stroke="#4f46e5" stroke-opacity="0.55" stroke-width="2"/>
    <!-- Elemento técnico (inner) -->
    <circle r="62" fill="#4f46e5"/>
    <!-- Labels inside -->
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-family="Inter, sans-serif" font-size="14" font-weight="700">Elemento</text>
    <text x="0" y="-180" text-anchor="middle" fill="#3730a3" font-family="Inter, sans-serif" font-size="14" font-weight="600">Conjunto técnico</text>
    <text x="0" y="-100" text-anchor="middle" fill="#3730a3" font-family="Inter, sans-serif" font-size="14" font-weight="600">Individuo técnico</text>

    <!-- connectors/arrows of interaction -->
    <g stroke="#6366f1" stroke-opacity="0.4" stroke-width="1.4" fill="none">
      <path d="M 0 -62 Q 100 -100 140 -8" marker-end="url(#arr)"/>
      <path d="M 140 8 Q 200 100 8 140" marker-end="url(#arr)"/>
    </g>
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" fill-opacity="0.7"/>
      </marker>
    </defs>
  </g>

  <!-- Right column: definitions -->
  <g font-family="Inter, system-ui, sans-serif" fill="#0f172a">
    <text x="620" y="90" font-size="24" font-weight="700" fill="#3730a3">Los tres niveles de la técnica</text>
    <text x="620" y="118" font-size="14" fill="#475569">Según Gilbert Simondon, la técnica no es un solo aparato:</text>

    <!-- Element row -->
    <circle cx="640" cy="170" r="10" fill="#4f46e5"/>
    <text x="665" y="168" font-size="16" font-weight="700" fill="#1e1b4b">Elemento técnico</text>
    <text x="665" y="190" font-size="14" fill="#334155">Piezas y herramientas: un chip, un sensor, un prompt, una línea de código.</text>

    <!-- Individual row -->
    <circle cx="640" cy="250" r="14" fill="none" stroke="#4f46e5" stroke-width="2"/>
    <text x="665" y="248" font-size="16" font-weight="700" fill="#1e1b4b">Individuo técnico</text>
    <text x="665" y="270" font-size="14" fill="#334155">Máquinas integradas: un celular, un modelo de lenguaje, un LMS.</text>

    <!-- Ensemble row -->
    <circle cx="640" cy="330" r="16" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="665" y="328" font-size="16" font-weight="700" fill="#1e1b4b">Conjunto técnico</text>
    <text x="665" y="350" font-size="14" fill="#334155">Redes, plataformas, infraestructuras, prácticas y usuarios articulados.</text>

    <!-- pedagogical hint -->
    <rect x="620" y="400" width="540" height="130" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="640" y="430" font-size="14" font-weight="700" fill="#3730a3">Implicación pedagógica</text>
    <text x="640" y="454" font-size="13" fill="#334155">Cuando pensamos la IA solo como elemento (un chatbot, una herramienta),</text>
    <text x="640" y="472" font-size="13" fill="#334155">perdemos de vista al individuo técnico (el modelo con sus sesgos) y al</text>
    <text x="640" y="490" font-size="13" fill="#334155">conjunto (datos, empresas, política, aula). La pregunta educativa cambia:</text>
    <text x="640" y="510" font-size="13" font-style="italic" fill="#3730a3">no «¿cómo uso esto?» sino «¿en qué sistema vivo cuando uso esto?».</text>
  </g>
</svg>
