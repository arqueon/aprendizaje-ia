<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="doc1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="doc2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="doc3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c7d2fe" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Soft ambient glows -->
  <ellipse cx="200" cy="120" rx="320" ry="260" fill="url(#glow)"/>
  <ellipse cx="1050" cy="520" rx="380" ry="300" fill="url(#glow)"/>

  <!-- Three stacked document cards (one per nivel) -->
  <g transform="translate(280,150)">
    <!-- Posgrado (back) -->
    <g transform="translate(0,0) rotate(-9 320 200)">
      <rect x="0" y="0" width="380" height="450" rx="22" fill="url(#doc3)" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.5"/>
      <rect x="40" y="60" width="220" height="14" rx="6" fill="#ffffff" fill-opacity="0.55"/>
      <rect x="40" y="92" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="40" y="140" width="300" height="6" rx="3" fill="#ffffff" fill-opacity="0.25"/>
      <rect x="40" y="158" width="280" height="6" rx="3" fill="#ffffff" fill-opacity="0.25"/>
      <rect x="40" y="176" width="290" height="6" rx="3" fill="#ffffff" fill-opacity="0.25"/>
      <rect x="40" y="220" width="120" height="80" rx="8" fill="#ffffff" fill-opacity="0.2"/>
      <rect x="180" y="220" width="160" height="80" rx="8" fill="#ffffff" fill-opacity="0.2"/>
      <rect x="40" y="320" width="300" height="6" rx="3" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="40" y="338" width="280" height="6" rx="3" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="40" y="356" width="260" height="6" rx="3" fill="#ffffff" fill-opacity="0.22"/>
    </g>

    <!-- Licenciatura (middle) -->
    <g transform="translate(120,40)">
      <rect x="0" y="0" width="380" height="450" rx="22" fill="url(#doc2)" stroke="#fbbf24" stroke-width="2" stroke-opacity="0.5"/>
      <rect x="40" y="60" width="240" height="14" rx="6" fill="#ffffff" fill-opacity="0.7"/>
      <rect x="40" y="92" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.55"/>
      <rect x="40" y="140" width="300" height="6" rx="3" fill="#ffffff" fill-opacity="0.35"/>
      <rect x="40" y="158" width="280" height="6" rx="3" fill="#ffffff" fill-opacity="0.35"/>
      <rect x="40" y="176" width="290" height="6" rx="3" fill="#ffffff" fill-opacity="0.35"/>
      <rect x="40" y="220" width="120" height="80" rx="8" fill="#ffffff" fill-opacity="0.28"/>
      <rect x="180" y="220" width="160" height="80" rx="8" fill="#ffffff" fill-opacity="0.28"/>
      <rect x="40" y="320" width="300" height="6" rx="3" fill="#ffffff" fill-opacity="0.3"/>
      <rect x="40" y="338" width="280" height="6" rx="3" fill="#ffffff" fill-opacity="0.3"/>
      <rect x="40" y="356" width="260" height="6" rx="3" fill="#ffffff" fill-opacity="0.3"/>
    </g>

    <!-- Bachillerato (front) -->
    <g transform="translate(260,80) rotate(9 190 220)">
      <rect x="0" y="0" width="380" height="450" rx="22" fill="url(#doc1)" stroke="#7dd3fc" stroke-width="2" stroke-opacity="0.6"/>
      <rect x="40" y="60" width="220" height="14" rx="6" fill="#ffffff" fill-opacity="0.85"/>
      <rect x="40" y="92" width="160" height="10" rx="5" fill="#ffffff" fill-opacity="0.7"/>
      <rect x="40" y="140" width="300" height="6" rx="3" fill="#ffffff" fill-opacity="0.45"/>
      <rect x="40" y="158" width="280" height="6" rx="3" fill="#ffffff" fill-opacity="0.45"/>
      <rect x="40" y="176" width="290" height="6" rx="3" fill="#ffffff" fill-opacity="0.45"/>
      <circle cx="100" cy="260" r="36" fill="#ffffff" fill-opacity="0.35"/>
      <rect x="160" y="240" width="180" height="10" rx="5" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="160" y="260" width="160" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>
      <rect x="160" y="278" width="170" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>
      <rect x="40" y="340" width="300" height="6" rx="3" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="40" y="358" width="280" height="6" rx="3" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="40" y="376" width="260" height="6" rx="3" fill="#ffffff" fill-opacity="0.4"/>
    </g>
  </g>

  <!-- Subtle neural-network nodes (decorative) -->
  <g opacity="0.55">
    <circle cx="120" cy="500" r="5" fill="#c7d2fe"/>
    <circle cx="180" cy="540" r="3" fill="#a5b4fc"/>
    <circle cx="80" cy="420" r="4" fill="#a5b4fc"/>
    <circle cx="160" cy="450" r="3" fill="#c7d2fe"/>
    <line x1="120" y1="500" x2="180" y2="540" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.45"/>
    <line x1="120" y1="500" x2="80"  y2="420" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.45"/>
    <line x1="120" y1="500" x2="160" y2="450" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.45"/>

    <circle cx="1080" cy="160" r="5" fill="#c7d2fe"/>
    <circle cx="1140" cy="200" r="3" fill="#a5b4fc"/>
    <circle cx="1040" cy="100" r="4" fill="#a5b4fc"/>
    <circle cx="1130" cy="120" r="3" fill="#c7d2fe"/>
    <line x1="1080" y1="160" x2="1140" y2="200" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.45"/>
    <line x1="1080" y1="160" x2="1040" y2="100" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.45"/>
    <line x1="1080" y1="160" x2="1130" y2="120" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.45"/>
  </g>
</svg>
