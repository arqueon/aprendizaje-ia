baseURL = '/'
languageCode = 'es'
title = 'Aprendizaje Digital e IA'
theme = 'github.com/nunocoracao/blowfish/v2'

[outputs]
home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
colorScheme = "ocean"
defaultTheme = "light"
enableSearch = true
showMermaid = true
mainSections = ["laboratorio", "observatorio", "recursos", "cultura", "marcos-referencia"]

[params.homepage]
  layout = "background"
  homepageImage = "images/hero-bg.svg"
  showRecent = false

[params.article]
  showMermaid = true
  showDate = true
  showAuthor = false
  showReadingTime = true
  showWordCount = false
  showTags = true
  showBreadcrumbs = true
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 3
  showScrollToTop = true

[params.list]
  showHero = true
  heroStyle = "big"
  showCards = true
  showSummary = true
  groupByYear = false

[params.sidebar]
  showSidebar = true
  groupDepth = 2

[menu]
[[menu.main]]
identifier = "laboratorio"
name = "Laboratorio"
url = "/laboratorio/"
weight = 10
[[menu.main]]
identifier = "observatorio"
name = "Observatorio"
url = "/observatorio/"
weight = 20
[[menu.main]]
identifier = "recursos"
name = "Recursos"
url = "/recursos/"
weight = 30
[[menu.main]]
identifier = "cultura"
name = "Cultura"
url = "/cultura/"
weight = 40
[[menu.main]]
identifier = "marcos-referencia"
name = "Marcos de Referencia"
url = "/marcos-referencia/"
weight = 50
[[menu.main]]
identifier = "blog"
name = "Blog"
url = "/blog/"
weight = 60

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
