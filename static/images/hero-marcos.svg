<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- Structural grid (blueprint feel) -->
  <g stroke="#f97316" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1050" y1="0" x2="1050" y2="500"/>
  </g>

  <!-- Central scale/balance structure -->
  <g transform="translate(600,250)" stroke="#fb923c" stroke-opacity="0.7" fill="none">
    <!-- Vertical beam -->
    <line x1="0" y1="-140" x2="0" y2="100" stroke-width="3"/>
    <!-- Horizontal beam -->
    <line x1="-180" y1="-80" x2="180" y2="-80" stroke-width="2.5"/>
    <!-- Pivot point -->
    <circle cx="0" cy="-80" r="8" fill="#fb923c" fill-opacity="0.6"/>
    <!-- Left arm -->
    <line x1="-180" y1="-80" x2="-180" y2="20" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Right arm -->
    <line x1="180" y1="-80" x2="180" y2="20" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Left pan -->
    <path d="M -230,20 Q -180,35 -130,20" stroke-width="2" stroke-linecap="round"/>
    <!-- Right pan -->
    <path d="M 130,20 Q 180,35 230,20" stroke-width="2" stroke-linecap="round"/>
    <!-- Base -->
    <path d="M -40,100 L 40,100 L 20,80 L -20,80 Z" fill="#fb923c" fill-opacity="0.3" stroke-width="1.5"/>
    <!-- Left pan chains -->
    <line x1="-210" y1="20" x2="-180" y2="-80" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="-150" y1="20" x2="-180" y2="-80" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Right pan chains -->
    <line x1="150" y1="20" x2="180" y2="-80" stroke-width="1" stroke-opacity="0.4"/>
    <line x1="210" y1="20" x2="180" y2="-80" stroke-width="1" stroke-opacity="0.4"/>
  </g>

  <!-- Left pan content - icons for ethical/pedagogical concepts -->
  <g transform="translate(420,250)" fill="#fdba74" fill-opacity="0.5" font-size="20" font-family="sans-serif">
    <text x="-15" y="10">⚖</text>
  </g>
  <g fill="#fdba74" fill-opacity="0.3" font-family="sans-serif" font-size="11">
    <text x="340" y="290">Ética</text>
    <text x="330" y="305">Pedagógica</text>
  </g>

  <!-- Right pan content -->
  <g transform="translate(780,250)" fill="#fdba74" fill-opacity="0.5" font-size="20" font-family="sans-serif">
    <text x="-15" y="10">🧠</text>
  </g>
  <g fill="#fdba74" fill-opacity="0.3" font-family="sans-serif" font-size="11">
    <text x="800" y="290">Metacog-</text>
    <text x="800" y="305">nición</text>
  </g>

  <!-- Hexagonal framework nodes -->
  <g fill="none" stroke="#fb923c" stroke-opacity="0.3" stroke-width="1.5">
    <!-- Top-left hex -->
    <polygon points="130,100 160,83 190,100 190,134 160,151 130,134"/>
    <!-- Top-right hex -->
    <polygon points="1010,100 1040,83 1070,100 1070,134 1040,151 1010,134"/>
    <!-- Bottom-left hex -->
    <polygon points="130,340 160,323 190,340 190,374 160,391 130,374"/>
    <!-- Bottom-right hex -->
    <polygon points="1010,340 1040,323 1070,340 1070,374 1040,391 1010,374"/>
  </g>

  <!-- Framework labels -->
  <g fill="#fdba74" font-family="sans-serif" font-size="9" fill-opacity="0.45" text-anchor="middle">
    <text x="160" y="118">MARCO</text>
    <text x="160" y="130">ÉTICO</text>
    <text x="1040" y="118">MARCO</text>
    <text x="1040" y="130">COGNITIVO</text>
    <text x="160" y="358">EQUIDAD</text>
    <text x="160" y="370">DIGITAL</text>
    <text x="1040" y="358">EVALUACIÓN</text>
    <text x="1040" y="370">AUTÉNTICA</text>
  </g>

  <!-- Connecting lines to hexagons -->
  <g stroke="#fb923c" stroke-opacity="0.15" stroke-width="1">
    <line x1="190" y1="117" x2="420" y2="250"/>
    <line x1="1010" y1="117" x2="780" y2="250"/>
    <line x1="190" y1="357" x2="420" y2="250"/>
    <line x1="1010" y1="357" x2="780" y2="250"/>
  </g>

  <!-- Ambient particles -->
  <g fill="#fed7aa" fill-opacity="0.2">
    <circle cx="60" cy="60" r="2"/>
    <circle cx="600" cy="30" r="2"/>
    <circle cx="1140" cy="80" r="2"/>
    <circle cx="100" cy="460" r="2"/>
    <circle cx="1100" cy="450" r="2"/>
  </g>
</svg>
