<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- Grid subtle -->
  <g stroke="#2dd4bf" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- Central flask shape -->
  <g transform="translate(600,250)">
    <!-- Flask body -->
    <polygon points="-60,120 -90,60 -40,-80 40,-80 90,60 60,120"
      fill="none" stroke="#2dd4bf" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Flask neck -->
    <rect x="-20" y="-120" width="40" height="45" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-opacity="0.6"/>
    <!-- Liquid inside -->
    <polygon points="-55,115 -75,50 75,50 55,115"
      fill="#0d9488" fill-opacity="0.25"/>
    <!-- Bubbles -->
    <circle cx="-20" cy="80" r="6" fill="#2dd4bf" fill-opacity="0.4"/>
    <circle cx="15" cy="60" r="4" fill="#2dd4bf" fill-opacity="0.35"/>
    <circle cx="-5" cy="100" r="3" fill="#2dd4bf" fill-opacity="0.3"/>
    <!-- Stars/sparks around flask -->
    <g fill="#5eead4" fill-opacity="0.6" font-size="18" font-family="sans-serif">
      <text x="-160" y="-30">✦</text>
      <text x="130" y="20">✦</text>
      <text x="-140" y="80">✧</text>
      <text x="145" y="-60">✧</text>
    </g>
  </g>

  <!-- Circuit lines left -->
  <g stroke="#2dd4bf" stroke-opacity="0.3" stroke-width="1.5" fill="none">
    <polyline points="100,150 200,150 200,200 350,200"/>
    <polyline points="100,300 180,300 180,250 350,250"/>
    <circle cx="100" cy="150" r="4" fill="#2dd4bf" fill-opacity="0.5"/>
    <circle cx="200" cy="200" r="3" fill="#2dd4bf" fill-opacity="0.4"/>
    <circle cx="100" cy="300" r="4" fill="#2dd4bf" fill-opacity="0.5"/>
    <circle cx="180" cy="250" r="3" fill="#2dd4bf" fill-opacity="0.4"/>
  </g>

  <!-- Circuit lines right -->
  <g stroke="#2dd4bf" stroke-opacity="0.3" stroke-width="1.5" fill="none">
    <polyline points="1100,180 1000,180 1000,220 850,220"/>
    <polyline points="1100,320 980,320 980,270 850,270"/>
    <circle cx="1100" cy="180" r="4" fill="#2dd4bf" fill-opacity="0.5"/>
    <circle cx="1000" cy="220" r="3" fill="#2dd4bf" fill-opacity="0.4"/>
    <circle cx="1100" cy="320" r="4" fill="#2dd4bf" fill-opacity="0.5"/>
    <circle cx="980" cy="270" r="3" fill="#2dd4bf" fill-opacity="0.4"/>
  </g>

  <!-- Hexagons (innovation cells) -->
  <g fill="none" stroke="#2dd4bf" stroke-opacity="0.2" stroke-width="1.5">
    <polygon points="180,80 210,62 240,80 240,116 210,134 180,116"/>
    <polygon points="950,380 980,362 1010,380 1010,416 980,434 950,416"/>
    <polygon points="80,380 110,362 140,380 140,416 110,434 80,416"/>
    <polygon points="1060,100 1090,82 1120,100 1120,136 1090,154 1060,136"/>
  </g>

  <!-- Ambient particles -->
  <g fill="#5eead4" fill-opacity="0.25">
    <circle cx="50" cy="100" r="2"/>
    <circle cx="300" cy="80" r="2"/>
    <circle cx="900" cy="60" r="2"/>
    <circle cx="1150" cy="400" r="2"/>
    <circle cx="400" cy="440" r="2"/>
  </g>
</svg>
