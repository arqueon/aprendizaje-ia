<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- Connection lines between people -->
  <g stroke="#a855f7" stroke-opacity="0.25" stroke-width="1.5" fill="none">
    <line x1="250" y1="220" x2="450" y2="220"/>
    <line x1="450" y1="220" x2="600" y2="200"/>
    <line x1="600" y1="200" x2="750" y2="220"/>
    <line x1="750" y1="220" x2="950" y2="220"/>
    <line x1="250" y1="220" x2="350" y2="350"/>
    <line x1="450" y1="220" x2="350" y2="350"/>
    <line x1="450" y1="220" x2="600" y2="360"/>
    <line x1="600" y1="200" x2="600" y2="360"/>
    <line x1="750" y1="220" x2="850" y2="350"/>
    <line x1="950" y1="220" x2="850" y2="350"/>
    <line x1="350" y1="350" x2="600" y2="360"/>
    <line x1="600" y1="360" x2="850" y2="350"/>
    <!-- Extra connections -->
    <line x1="250" y1="220" x2="150" y2="330"/>
    <line x1="950" y1="220" x2="1050" y2="330"/>
    <line x1="150" y1="330" x2="350" y2="350"/>
    <line x1="1050" y1="330" x2="850" y2="350"/>
  </g>

  <!-- Person silhouettes (head + body simplified) -->
  <g fill="#7c3aed" fill-opacity="0.7">
    <!-- Person 1: top-left hub -->
    <circle cx="250" cy="200" r="14"/>
    <ellipse cx="250" cy="235" rx="20" ry="12"/>
    <!-- Person 2: top-center-left -->
    <circle cx="450" cy="200" r="14"/>
    <ellipse cx="450" cy="235" rx="20" ry="12"/>
    <!-- Person 3: top-center (larger = hub) -->
    <circle cx="600" cy="175" r="18"/>
    <ellipse cx="600" cy="215" rx="25" ry="14"/>
    <!-- Person 4: top-center-right -->
    <circle cx="750" cy="200" r="14"/>
    <ellipse cx="750" cy="235" rx="20" ry="12"/>
    <!-- Person 5: top-right hub -->
    <circle cx="950" cy="200" r="14"/>
    <ellipse cx="950" cy="235" rx="20" ry="12"/>
    <!-- Person 6: bottom-left -->
    <circle cx="350" cy="330" r="12"/>
    <ellipse cx="350" cy="360" rx="18" ry="10"/>
    <!-- Person 7: bottom-center -->
    <circle cx="600" cy="340" r="12"/>
    <ellipse cx="600" cy="370" rx="18" ry="10"/>
    <!-- Person 8: bottom-right -->
    <circle cx="850" cy="330" r="12"/>
    <ellipse cx="850" cy="360" rx="18" ry="10"/>
    <!-- Person 9: far-left -->
    <circle cx="150" cy="310" r="11"/>
    <ellipse cx="150" cy="338" rx="16" ry="9"/>
    <!-- Person 10: far-right -->
    <circle cx="1050" cy="310" r="11"/>
    <ellipse cx="1050" cy="338" rx="16" ry="9"/>
  </g>

  <!-- Highlighted nodes (active participants) -->
  <g fill="#e879f9" fill-opacity="0.85">
    <circle cx="600" cy="175" r="18"/>
    <ellipse cx="600" cy="215" rx="25" ry="14"/>
  </g>
  <circle cx="600" cy="175" r="28" fill="none" stroke="#e879f9" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Word cloud / values -->
  <g fill="#d8b4fe" font-family="sans-serif" fill-opacity="0.4">
    <text x="60" y="120" font-size="14">Ética</text>
    <text x="60" y="420" font-size="12">Transparencia</text>
    <text x="1060" y="120" font-size="13">Integridad</text>
    <text x="1000" y="420" font-size="12">Comunidad</text>
    <text x="530" y="460" font-size="13">Cultura</text>
    <text x="530" y="50" font-size="14">Digital</text>
  </g>

  <!-- Subtle rings around center person -->
  <circle cx="600" cy="175" r="50" fill="none" stroke="#c084fc" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="600" cy="175" r="80" fill="none" stroke="#c084fc" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Ambient particles -->
  <g fill="#d8b4fe" fill-opacity="0.2">
    <circle cx="100" cy="80" r="2"/>
    <circle cx="400" cy="60" r="2"/>
    <circle cx="800" cy="50" r="2"/>
    <circle cx="1150" cy="200" r="2"/>
    <circle cx="1100" cy="450" r="2"/>
    <circle cx="200" cy="460" r="2"/>
  </g>
</svg>
