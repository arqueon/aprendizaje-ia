<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <radialGradient id="glow" cx="35%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#38bdf8" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="75" x2="600" y2="75"/><line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="225" x2="600" y2="225"/><line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/>
  </g>

  <!-- Flask shape -->
  <g fill="none" stroke="#7dd3fc" stroke-opacity="0.35" stroke-width="1.8" stroke-linejoin="round">
    <!-- Neck -->
    <rect x="185" y="70" width="30" height="55" rx="3" fill="#0ea5e9" fill-opacity="0.08"/>
    <!-- Body trapezoid -->
    <path d="M 175 125 L 140 210 Q 138 220 148 222 L 252 222 Q 262 220 260 210 L 225 125 Z" fill="#0ea5e9" fill-opacity="0.10"/>
    <!-- Liquid fill -->
    <path d="M 155 185 Q 165 178, 175 185 Q 185 192, 200 185 Q 215 178, 225 185 Q 235 192, 245 185 L 252 210 Q 252 218 242 220 L 158 220 Q 148 218 148 210 Z" fill="#0ea5e9" fill-opacity="0.28" stroke="none"/>
  </g>
  <!-- Flask outline clean -->
  <g fill="none" stroke="#7dd3fc" stroke-opacity="0.50" stroke-width="1.8" stroke-linejoin="round">
    <rect x="185" y="70" width="30" height="55" rx="3"/>
    <path d="M 175 125 L 140 210 Q 138 220 148 222 L 252 222 Q 262 220 260 210 L 225 125 Z"/>
    <line x1="178" y1="125" x2="222" y2="125"/>
  </g>

  <!-- Bubbles inside flask -->
  <g fill="#7dd3fc" fill-opacity="0.45">
    <circle cx="170" cy="205" r="5"/>
    <circle cx="190" cy="190" r="3.5"/>
    <circle cx="215" cy="198" r="4"/>
    <circle cx="235" cy="188" r="3"/>
    <circle cx="200" cy="175" r="2.5"/>
  </g>

  <!-- Sparkle/reaction dots around flask -->
  <g fill="#38bdf8" fill-opacity="0.60">
    <circle cx="130" cy="145" r="3"/>
    <circle cx="120" cy="180" r="2"/>
    <circle cx="270" cy="150" r="3"/>
    <circle cx="280" cy="175" r="2"/>
    <circle cx="155" cy="115" r="2"/>
    <circle cx="248" cy="108" r="2"/>
  </g>

  <!-- Connection lines to right — experiment results -->
  <g stroke="#38bdf8" stroke-opacity="0.22" stroke-width="1" fill="none">
    <line x1="280" y1="150" x2="370" y2="110"/>
    <line x1="280" y1="170" x2="380" y2="170"/>
    <line x1="280" y1="190" x2="370" y2="220"/>
    <line x1="370" y1="110" x2="460" y2="90"/>
    <line x1="380" y1="170" x2="470" y2="155"/>
    <line x1="380" y1="170" x2="465" y2="195"/>
    <line x1="370" y1="220" x2="455" y2="230"/>
  </g>
  <g fill="#0ea5e9" fill-opacity="0.80">
    <circle cx="380" cy="170" r="5"/>
    <circle cx="370" cy="110" r="4"/>
    <circle cx="370" cy="220" r="4"/>
  </g>
  <g fill="#7dd3fc" fill-opacity="0.60">
    <circle cx="460" cy="90" r="3"/><circle cx="470" cy="155" r="3"/>
    <circle cx="465" cy="195" r="3"/><circle cx="455" cy="230" r="3"/>
  </g>

  <text x="30" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#bae6fd" fill-opacity="0.60" font-weight="500">LABORATORIO DE INNOVACIÓN</text>
  <defs><linearGradient id="ov" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0c1a3a" stop-opacity="0"/><stop offset="100%" stop-color="#0c1a3a" stop-opacity="0.45"/></linearGradient></defs>
  <rect width="600" height="300" fill="url(#ov)"/>
</svg>
