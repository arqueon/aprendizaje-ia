<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1002"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#fbbf24" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="75" x2="600" y2="75"/><line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="225" x2="600" y2="225"/><line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/>
  </g>

  <!-- Radar rings -->
  <g fill="none" stroke="#fbbf24" stroke-opacity="0.12" stroke-width="1">
    <circle cx="200" cy="150" r="30"/><circle cx="200" cy="150" r="55"/>
    <circle cx="200" cy="150" r="80"/><circle cx="200" cy="150" r="105"/>
  </g>
  <!-- Radar sweep line -->
  <line x1="200" y1="150" x2="285" y2="80" stroke="#fbbf24" stroke-opacity="0.30" stroke-width="1.5"/>
  <!-- Radar sector fill -->
  <path d="M 200 150 L 285 80 A 105 105 0 0 1 305 155 Z" fill="#fbbf24" fill-opacity="0.06"/>

  <!-- Eye shape -->
  <g fill="none" stroke="#fcd34d" stroke-opacity="0.55" stroke-width="1.8">
    <path d="M 110 150 Q 200 80, 290 150 Q 200 220, 110 150 Z"/>
    <circle cx="200" cy="150" r="28" fill="#fbbf24" fill-opacity="0.12"/>
    <circle cx="200" cy="150" r="16" fill="#f59e0b" fill-opacity="0.22"/>
    <circle cx="200" cy="150" r="7" fill="#f59e0b" fill-opacity="0.70" stroke="none"/>
  </g>
  <!-- Iris detail -->
  <circle cx="207" cy="144" r="3" fill="#fef3c7" fill-opacity="0.50"/>

  <!-- Data points on radar -->
  <g fill="#fbbf24" fill-opacity="0.80">
    <circle cx="250" cy="105" r="4"/>
    <circle cx="270" cy="155" r="4"/>
    <circle cx="245" cy="200" r="4"/>
    <circle cx="155" cy="105" r="3"/>
    <circle cx="135" cy="165" r="3"/>
  </g>

  <!-- Bar chart on the right -->
  <g fill="#fbbf24" fill-opacity="0.20" stroke="#fbbf24" stroke-opacity="0.45" stroke-width="1">
    <rect x="350" y="180" width="18" height="55"/>
    <rect x="375" y="155" width="18" height="80"/>
    <rect x="400" y="130" width="18" height="105"/>
    <rect x="425" y="145" width="18" height="90"/>
    <rect x="450" y="110" width="18" height="125"/>
    <rect x="475" y="125" width="18" height="110"/>
    <rect x="500" y="95" width="18" height="140"/>
  </g>
  <!-- Chart baseline -->
  <line x1="345" y1="235" x2="525" y2="235" stroke="#fbbf24" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Trend line over bars -->
  <polyline points="359,175 384,152 409,127 434,142 459,107 484,122 509,92"
    fill="none" stroke="#fcd34d" stroke-opacity="0.55" stroke-width="1.5" stroke-linejoin="round"/>

  <text x="30" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#fde68a" fill-opacity="0.60" font-weight="500">OBSERVATORIO</text>
  <defs><linearGradient id="ov" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1c1002" stop-opacity="0"/><stop offset="100%" stop-color="#1c1002" stop-opacity="0.45"/></linearGradient></defs>
  <rect width="600" height="300" fill="url(#ov)"/>
</svg>
