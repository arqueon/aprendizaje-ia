<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022c22"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <rect width="600" height="300" fill="url(#glow)"/>

  <!-- Grid -->
  <g stroke="#34d399" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="75" x2="600" y2="75"/><line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="225" x2="600" y2="225"/><line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/><line x1="450" y1="0" x2="450" y2="300"/>
  </g>

  <!-- Person icons (stick figures stylized) — community of teachers -->
  <!-- Helper: person = head circle + body line + arms + legs -->
  <!-- Person 1 (center, larger) -->
  <g stroke="#34d399" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round" fill="none">
    <circle cx="200" cy="112" r="16" fill="#10b981" fill-opacity="0.18"/>
    <line x1="200" y1="128" x2="200" y2="178"/>
    <line x1="175" y1="148" x2="225" y2="148"/>
    <line x1="200" y1="178" x2="180" y2="210"/>
    <line x1="200" y1="178" x2="220" y2="210"/>
  </g>
  <!-- Graduation cap on person 1 -->
  <g fill="#6ee7b7" fill-opacity="0.70">
    <rect x="186" y="96" width="28" height="5" rx="1"/>
    <polygon points="200,88 215,96 200,96 185,96"/>
    <line x1="215" y1="96" x2="218" y2="106" stroke="#6ee7b7" stroke-opacity="0.70" stroke-width="1.5"/>
    <circle cx="218" cy="108" r="2.5"/>
  </g>

  <!-- Person 2 (left) -->
  <g stroke="#34d399" stroke-opacity="0.40" stroke-width="1.5" stroke-linecap="round" fill="none">
    <circle cx="120" cy="140" r="12" fill="#10b981" fill-opacity="0.12"/>
    <line x1="120" y1="152" x2="120" y2="192"/>
    <line x1="100" y1="168" x2="140" y2="168"/>
    <line x1="120" y1="192" x2="105" y2="218"/>
    <line x1="120" y1="192" x2="135" y2="218"/>
  </g>

  <!-- Person 3 (right) -->
  <g stroke="#34d399" stroke-opacity="0.40" stroke-width="1.5" stroke-linecap="round" fill="none">
    <circle cx="285" cy="135" r="12" fill="#10b981" fill-opacity="0.12"/>
    <line x1="285" y1="147" x2="285" y2="187"/>
    <line x1="265" y1="163" x2="305" y2="163"/>
    <line x1="285" y1="187" x2="270" y2="213"/>
    <line x1="285" y1="187" x2="300" y2="213"/>
  </g>

  <!-- Connection lines between people -->
  <g stroke="#34d399" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <line x1="132" y1="148" x2="185" y2="138"/>
    <line x1="215" y1="138" x2="273" y2="143"/>
  </g>

  <!-- Growth curve on the right -->
  <g fill="none">
    <polyline points="330,240 360,210 390,185 420,170 450,148 480,128 510,105 540,85"
      stroke="#34d399" stroke-opacity="0.45" stroke-width="2" stroke-linejoin="round"/>
    <!-- Area fill under curve -->
    <path d="M 330 240 L 360 210 L 390 185 L 420 170 L 450 148 L 480 128 L 510 105 L 540 85 L 540 240 Z"
      fill="#10b981" fill-opacity="0.08"/>
  </g>
  <!-- Data points on curve -->
  <g fill="#34d399" fill-opacity="0.80">
    <circle cx="360" cy="210" r="4"/><circle cx="390" cy="185" r="4"/>
    <circle cx="420" cy="170" r="4"/><circle cx="450" cy="148" r="4"/>
    <circle cx="480" cy="128" r="4"/><circle cx="510" cy="105" r="4"/>
    <circle cx="540" cy="85" r="4"/>
  </g>
  <!-- Baseline -->
  <line x1="325" y1="240" x2="545" y2="240" stroke="#34d399" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Lightbulb icon -->
  <g fill="none" stroke="#6ee7b7" stroke-opacity="0.45" stroke-width="1.4">
    <path d="M 355 55 A 18 18 0 1 1 370 80 L 370 90 L 355 90 L 355 80 A 18 18 0 0 1 345 62 Z"/>
    <line x1="352" y1="93" x2="373" y2="93"/>
    <line x1="354" y1="97" x2="371" y2="97"/>
    <line x1="357" y1="101" x2="368" y2="101"/>
  </g>
  <circle cx="362" cy="57" r="4" fill="#a7f3d0" fill-opacity="0.40" stroke="none"/>

  <text x="30" y="270" font-family="system-ui, sans-serif" font-size="11" fill="#a7f3d0" fill-opacity="0.60" font-weight="500">FORMACIÓN DOCENTE</text>
  <defs><linearGradient id="ov" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#022c22" stop-opacity="0"/><stop offset="100%" stop-color="#022c22" stop-opacity="0.45"/></linearGradient></defs>
  <rect width="600" height="300" fill="url(#ov)"/>
</svg>
