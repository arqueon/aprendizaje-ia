<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1a2e05"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#4ade80" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="125" x2="1200" y2="125"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="375" x2="1200" y2="375"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
  </g>

  <!-- Book stack (center-left) -->
  <g transform="translate(380,250)">
    <!-- Book 1 (bottom) -->
    <rect x="-80" y="60" width="160" height="25" rx="3" fill="#166534" fill-opacity="0.7" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="-78" y="60" width="6" height="25" rx="1" fill="#4ade80" fill-opacity="0.3"/>
    <!-- Book 2 -->
    <rect x="-75" y="30" width="150" height="25" rx="3" fill="#14532d" fill-opacity="0.7" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="-73" y="30" width="6" height="25" rx="1" fill="#4ade80" fill-opacity="0.3"/>
    <!-- Book 3 -->
    <rect x="-70" y="0" width="140" height="25" rx="3" fill="#15803d" fill-opacity="0.7" stroke="#4ade80" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="-68" y="0" width="6" height="25" rx="1" fill="#4ade80" fill-opacity="0.3"/>
    <!-- Book 4 (top, tilted) -->
    <rect x="-65" y="-35" width="130" height="25" rx="3" fill="#166534" fill-opacity="0.7" stroke="#86efac" stroke-opacity="0.5" stroke-width="1" transform="rotate(-3)"/>
    <!-- Open book on top -->
    <g transform="translate(0,-70)">
      <path d="M -50,0 Q 0,-15 50,0 L 50,40 Q 0,25 -50,40 Z" fill="#052e16" fill-opacity="0.8" stroke="#4ade80" stroke-opacity="0.5" stroke-width="1"/>
      <line x1="0" y1="-15" x2="0" y2="40" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>
      <!-- Lines on pages -->
      <g stroke="#4ade80" stroke-opacity="0.2" stroke-width="0.8">
        <line x1="-35" y1="5" x2="-10" y2="3"/>
        <line x1="-35" y1="12" x2="-10" y2="10"/>
        <line x1="-35" y1="19" x2="-10" y2="17"/>
        <line x1="10" y1="3" x2="35" y2="5"/>
        <line x1="10" y1="10" x2="35" y2="12"/>
        <line x1="10" y1="17" x2="35" y2="19"/>
      </g>
    </g>
  </g>

  <!-- Gear / tool (center-right) -->
  <g transform="translate(820,250)" fill="none" stroke="#4ade80" stroke-opacity="0.4" stroke-width="2">
    <!-- Outer gear ring -->
    <circle r="80" stroke-opacity="0.15"/>
    <circle r="55"/>
    <circle r="30" stroke-opacity="0.6"/>
    <!-- Gear teeth -->
    <g stroke-opacity="0.35" stroke-width="8" stroke-linecap="square">
      <line x1="0" y1="-55" x2="0" y2="-75"/>
      <line x1="0" y1="55" x2="0" y2="75"/>
      <line x1="-55" y1="0" x2="-75" y2="0"/>
      <line x1="55" y1="0" x2="75" y2="0"/>
      <line x1="-39" y1="-39" x2="-53" y2="-53"/>
      <line x1="39" y1="-39" x2="53" y2="-53"/>
      <line x1="-39" y1="39" x2="-53" y2="53"/>
      <line x1="39" y1="39" x2="53" y2="53"/>
    </g>
    <!-- Center dot -->
    <circle r="8" fill="#4ade80" fill-opacity="0.6" stroke="none"/>
    <!-- Cross inside gear -->
    <line x1="-20" y1="0" x2="20" y2="0" stroke-opacity="0.5"/>
    <line x1="0" y1="-20" x2="0" y2="20" stroke-opacity="0.5"/>
  </g>

  <!-- Connection line between book and gear -->
  <g stroke="#4ade80" stroke-opacity="0.2" stroke-width="1.5" fill="none">
    <path d="M 480,250 Q 600,200 740,250"/>
  </g>
  <circle cx="610" cy="220" r="3" fill="#4ade80" fill-opacity="0.4"/>

  <!-- Tag/label elements -->
  <g fill="none" stroke="#4ade80" stroke-opacity="0.25" stroke-width="1.5">
    <rect x="100" y="150" width="120" height="35" rx="17"/>
    <rect x="100" y="200" width="90" height="30" rx="15"/>
    <rect x="100" y="245" width="110" height="30" rx="15"/>
    <rect x="980" y="160" width="100" height="30" rx="15"/>
    <rect x="980" y="205" width="120" height="30" rx="15"/>
    <rect x="980" y="250" width="85" height="30" rx="15"/>
  </g>
  <g fill="#4ade80" fill-opacity="0.2" font-family="monospace" font-size="10">
    <text x="118" y="172">Herramientas</text>
    <text x="118" y="220">Guías</text>
    <text x="118" y="265">Repositorios</text>
    <text x="994" y="180">Tutoriales</text>
    <text x="994" y="225">Plantillas</text>
    <text x="994" y="270">Datos</text>
  </g>

  <!-- Floating particles -->
  <g fill="#86efac" fill-opacity="0.25">
    <circle cx="50" cy="80" r="2"/>
    <circle cx="600" cy="50" r="2"/>
    <circle cx="1150" cy="420" r="2"/>
    <circle cx="250" cy="450" r="2"/>
    <circle cx="950" cy="470" r="2"/>
  </g>
</svg>
